<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>CELESTIAL NIGHT - POSTER</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
  <style>
    body, html { margin: 0; padding: 0; width: 1080px; height: 1920px; background-color: #050608; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    /* 背景の装飾 */
    .bg-gradient { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #11151a 0%, #050608 100%); z-index: 0; }
    .gold-border { position: absolute; top: 30px; left: 30px; width: calc(100% - 60px); height: calc(100% - 60px); border: 2px solid rgba(212, 175, 55, 0.3); border-radius: 20px; box-shadow: inset 0 0 50px rgba(212, 175, 55, 0.05); z-index: 1; pointer-events: none; }

    /* コンテンツエリア */
    .content { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 60px 0; box-sizing: border-box; justify-content: flex-start; }
    
    /* ★ 自動縮小用のラッパー（この中身ごとズームアウトします） */
    #scale-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; transform-origin: top center; transition: transform 0.1s; }

    .header-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
    .brand-logo { font-family: 'Cinzel', serif; font-size: 65px; color: #d4af37; letter-spacing: 0.25em; text-shadow: 0 0 30px rgba(212, 175, 55, 0.6); margin-bottom: 10px; text-align: center; line-height: 1; }
    .date-display { font-size: 40px; color: #fff; font-weight: bold; background: rgba(212, 175, 55, 0.15); padding: 10px 50px; border-radius: 50px; border: 1px solid rgba(212, 175, 55, 0.5); text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); font-family: 'Cinzel', serif; }

    /* セクションタイトル */
    .section-title { font-family: 'Cinzel', serif; font-size: 35px; color: #fff; letter-spacing: 0.3em; margin: 15px 0 15px 0; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); border-bottom: 2px solid rgba(212, 175, 55, 0.5); padding-bottom: 5px; width: 920px; text-align: center; }
    #guest-title { border-bottom-color: rgba(155, 89, 182, 0.5); color: #e0b0ff; text-shadow: 0 0 15px rgba(155, 89, 182, 0.5); margin-top: 25px; }

    /* レイアウト：CASTは6列グリッド */
    .cast-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; width: 920px; }
    
    /* レイアウト：GUESTは左右に分けるコンテナ */
    .guest-split-container { display: flex; justify-content: space-between; width: 920px; gap: 30px; }
    .guest-side { flex: 1; display: flex; flex-direction: column; align-items: center; }
    .side-title { font-family: 'Cinzel', serif; font-size: 20px; letter-spacing: 0.2em; margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid currentColor; padding-bottom: 5px; width: 100%; text-align: center; }
    .guest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }

    /* カードのデザイン */
    .card { width: 100%; aspect-ratio: 3 / 5; background-color: #11151a; border-radius: 8px; border: 2px solid rgba(212, 175, 55, 0.8); overflow: hidden; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
    .card-img { width: 100%; height: 100%; object-fit: cover; }
    .card-info { position: absolute; bottom: 0; width: 100%; padding: 50% 10px 10px 10px; box-sizing: border-box; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 40%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; }
    
    .name { font-size: 19px; font-weight: bold; color: #fff; margin: 0 0 3px 0; text-shadow: 0 3px 6px #000; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .roles { font-family: 'Cinzel', serif; font-size: 11px; color: #d4af37; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .badge { position: absolute; background: rgba(0, 0, 0, 0.8); border: 2px solid; padding: 2px 5px; border-radius: 6px; font-weight: bold; font-size: 10px; }
    .sub-badge { top: 6px; right: 6px; border-color: #f39c12; color: #f39c12; }
    .badge-m { top: 6px; left: 6px; border-color: #e74c3c; color: #e74c3c; }
    .badge-c { top: 6px; left: 6px; border-color: #3498db; color: #3498db; }
    .border-m { border-color: rgba(231, 76, 60, 0.6); }
    .border-c { border-color: rgba(52, 152, 219, 0.6); }

    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #d4af37; font-size: 40px; font-family: 'Cinzel', serif; z-index: 100; text-shadow: 0 0 20px rgba(212,175,55,0.8); }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="gold-border"></div>

  <div id="loading">GENERATING POSTER...</div>

  <div class="content" id="main-content" style="opacity: 0;">
    <div id="scale-wrapper">
      <div class="header-area">
        <div class="brand-logo">CELESTIAL NIGHT</div>
        <div class="date-display" id="date-text">XXXX/XX/XX</div>
      </div>
      
      <div class="section-title">CAST</div>
      <div class="cast-grid" id="cast-container"></div>
      
      <div class="section-title" id="guest-title" style="display: none;">GUEST</div>
      <div class="guest-split-container" id="guest-split" style="display: none;">
        
        <div class="guest-side">
          <div class="side-title" style="color: #3498db; text-shadow: 0 0 10px #3498db;">C - SIDE</div>
          <div class="guest-grid" id="guest-c-container"></div>
        </div>

        <div class="guest-side">
          <div class="side-title" style="color: #e74c3c; text-shadow: 0 0 10px #e74c3c;">M - SIDE</div>
          <div class="guest-grid" id="guest-m-container"></div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxOnnUkklIpNwaRDDKpE8JKm_RowDc36P0RpD-z_9ZAnHbukcoeQ2pnRp8u9D1sVa8F/exec";
    const urlParams = new URLSearchParams(window.location.search);
    const targetDate = urlParams.get('date');
    const botKey = urlParams.get('bot_key');

    function createCardHtml(data, type) {
      let isSub = data.status === '🔺';
      let imgUrl = data.imageUrl || 'https://via.placeholder.com/240x400/11151a/d4af37?text=No+Image';
      
      let badgeHtml = '';
      if (type === 'cast' && isSub) badgeHtml = '<div class="badge sub-badge">SUB</div>';
      else if (type === 'guest-m') badgeHtml = '<div class="badge badge-m">M側</div>';
      else if (type === 'guest-c') badgeHtml = '<div class="badge badge-c">C側</div>';

      let topText = type === 'cast' ? (data.roles && data.roles.length > 0 ? data.roles.join(' / ') : '') : `[${data.number}]`;
      let borderColorClass = type === 'guest-m' ? 'border-m' : (type === 'guest-c' ? 'border-c' : '');

      return `
        <div class="card ${borderColorClass}">
          ${badgeHtml}
          <img src="${imgUrl}" class="card-img" crossorigin="anonymous">
          <div class="card-info">
            <div class="roles">${topText}</div>
            <h3 class="name" title="${data.name}">${data.name}</h3>
          </div>
        </div>
      `;
    }

    async function generatePoster() {
      if (!targetDate || !botKey) {
        document.getElementById('loading').innerText = "INVALID PARAMETERS";
        return;
      }
      document.getElementById('date-text').innerText = targetDate;

      try {
        let response = await fetch(`${GAS_URL}?action=getEventRoster&date=${encodeURIComponent(targetDate)}&bot_key=${botKey}`);
        let data = await response.json();
        if (data.status === "Error") throw new Error(data.message);

        // ==== CAST ====
        let casts = data.casts.filter(c => c.status !== "❌" && c.status !== "×" && c.status !== "-");
        casts.sort((a, b) => {
            if (a.status === '⭕' && b.status === '🔺') return -1;
            if (a.status === '🔺' && b.status === '⭕') return 1;
            return 0;
        });
        const castContainer = document.getElementById('cast-container');
        casts.forEach(cast => {
          castContainer.innerHTML += createCardHtml(cast, 'cast');
        });

        // ==== GUEST ====
        let guests = data.guests.filter(g => !g.name.includes('SOS') && !g.number.includes('SOS'));
        if (guests.length > 0) {
            document.getElementById('guest-title').style.display = 'block';
            document.getElementById('guest-split').style.display = 'flex';
            
            const mContainer = document.getElementById('guest-m-container');
            const cContainer = document.getElementById('guest-c-container');

            guests.sort((a, b) => {
                let numA = parseInt(a.number.replace(/[^0-9]/g, '')) || 999;
                let numB = parseInt(b.number.replace(/[^0-9]/g, '')) || 999;
                return numA - numB;
            });

            guests.forEach(guest => {
                if (guest.attribute.includes('M')) {
                    mContainer.innerHTML += createCardHtml(guest, 'guest-m');
                } else {
                    cContainer.innerHTML += createCardHtml(guest, 'guest-c');
                }
            });
        }

        // ★ 究極のフェイルセーフ：高さが1750px（安全圏）を超えたら、全体を自動で縮小する！
        const scaleWrapper = document.getElementById('scale-wrapper');
        const MAX_HEIGHT = 1750; 
        
        // 描画が終わったあとの高さをチェック
        if (scaleWrapper.offsetHeight > MAX_HEIGHT) {
            // はみ出す分だけ倍率を計算して縮小（例：0.8倍など）
            const scaleRatio = MAX_HEIGHT / scaleWrapper.offsetHeight;
            scaleWrapper.style.transform = `scale(${scaleRatio})`;
        }

        // 描画完了！
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-content').style.opacity = '1';

      } catch (e) {
        document.getElementById('loading').innerText = "ERROR: " + e.message;
      }
    }

    generatePoster();
  </script>
</body>
</html>
