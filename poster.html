<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>CELESTIAL NIGHT - POSTER</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
  <style>
    /* カードの基本サイズ（JSで人数に応じて自動で小さくなります） */
    :root {
      --card-width: 220px; 
    }

    body, html { margin: 0; padding: 0; width: 1080px; height: 1920px; background-color: #050608; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    /* 背景の装飾 */
    .bg-gradient { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #11151a 0%, #050608 100%); z-index: 0; }
    .gold-border { position: absolute; top: 30px; left: 30px; width: calc(100% - 60px); height: calc(100% - 60px); border: 2px solid rgba(212, 175, 55, 0.3); border-radius: 20px; box-shadow: inset 0 0 50px rgba(212, 175, 55, 0.05); z-index: 1; pointer-events: none; }

    /* コンテンツエリア */
    .content { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 60px 0; box-sizing: border-box; justify-content: flex-start; }
    
    .header-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
    .brand-logo { font-family: 'Cinzel', serif; font-size: 65px; color: #d4af37; letter-spacing: 0.25em; text-shadow: 0 0 30px rgba(212, 175, 55, 0.6); margin-bottom: 10px; text-align: center; line-height: 1; }
    .date-display { font-size: 40px; color: #fff; font-weight: bold; background: rgba(212, 175, 55, 0.15); padding: 10px 50px; border-radius: 50px; border: 1px solid rgba(212, 175, 55, 0.5); text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); font-family: 'Cinzel', serif; }

    /* セクションタイトル（CAST / GUEST） */
    .section-title { font-family: 'Cinzel', serif; font-size: 35px; color: #fff; letter-spacing: 0.3em; margin: 20px 0 15px 0; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); border-bottom: 2px solid rgba(212, 175, 55, 0.5); padding-bottom: 5px; width: 800px; text-align: center; }
    #guest-title { border-bottom-color: rgba(155, 89, 182, 0.5); color: #e0b0ff; text-shadow: 0 0 15px rgba(155, 89, 182, 0.5); }

    .cast-grid { display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start; gap: 15px; width: 960px; }
    
    /* カードのデザイン（CSS変数でサイズが連動します） */
    .card { width: var(--card-width); aspect-ratio: 3 / 5; background-color: #11151a; border-radius: 8px; border: 2px solid rgba(212, 175, 55, 0.8); overflow: hidden; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
    .card-img { width: 100%; height: 100%; object-fit: cover; }
    .card-info { position: absolute; bottom: 0; width: 100%; padding: 50% 10px 10px 10px; box-sizing: border-box; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 40%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; }
    
    /* 文字サイズもカードの大きさに合わせて自動で伸縮 */
    .name { font-size: calc(var(--card-width) * 0.14); font-weight: bold; color: #fff; margin: 0 0 3px 0; text-shadow: 0 3px 6px #000; line-height: 1.1; }
    .roles { font-family: 'Cinzel', serif; font-size: calc(var(--card-width) * 0.075); color: #d4af37; margin: 0; }
    
    .sub-badge { position: absolute; top: 8px; right: 8px; background: rgba(0, 0, 0, 0.8); border: 2px solid #f39c12; color: #f39c12; padding: 3px 6px; border-radius: 6px; font-weight: bold; font-size: calc(var(--card-width) * 0.06); }
    
    /* ゲスト用の装飾 */
    .guest-card { border-color: rgba(155, 89, 182, 0.6); }
    .guest-badge { position: absolute; top: 8px; left: 8px; background: rgba(0, 0, 0, 0.8); border: 2px solid; padding: 3px 6px; border-radius: 6px; font-weight: bold; font-size: calc(var(--card-width) * 0.06); }
    .badge-m { border-color: #e74c3c; color: #e74c3c; }
    .badge-c { border-color: #3498db; color: #3498db; }

    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #d4af37; font-size: 40px; font-family: 'Cinzel', serif; z-index: 100; text-shadow: 0 0 20px rgba(212,175,55,0.8); }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="gold-border"></div>

  <div id="loading">GENERATING POSTER...</div>

  <div class="content" id="main-content" style="opacity: 0;">
    <div class="header-area">
      <div class="brand-logo">CELESTIAL NIGHT</div>
      <div class="date-display" id="date-text">XXXX/XX/XX</div>
    </div>
    
    <div class="section-title">CAST</div>
    <div class="cast-grid" id="cast-container"></div>
    
    <div class="section-title" id="guest-title" style="display: none;">GUEST</div>
    <div class="cast-grid" id="guest-container"></div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxOnnUkklIpNwaRDDKpE8JKm_RowDc36P0RpD-z_9ZAnHbukcoeQ2pnRp8u9D1sVa8F/exec";
    const urlParams = new URLSearchParams(window.location.search);
    const targetDate = urlParams.get('date');
    const botKey = urlParams.get('bot_key');

    async function generatePoster() {
      if (!targetDate || !botKey) {
        document.getElementById('loading').innerText = "INVALID PARAMETERS";
        return;
      }
      document.getElementById('date-text').innerText = targetDate;

      try {
        let response = await fetch(`${GAS_URL}?action=getEventRoster&date=${encodeURIComponent(targetDate)}&bot_key=${botKey}`);
        let data = await response.json();
        if (data.status === "Error") throw new Error(data.message);

        // ❌(欠席)以外のキャスト、およびSOS以外のゲストを抽出
        let casts = data.casts.filter(c => c.status !== "❌" && c.status !== "×" && c.status !== "-");
        let guests = data.guests.filter(g => !g.name.includes('SOS') && !g.number.includes('SOS'));
        
        const castContainer = document.getElementById('cast-container');
        const guestContainer = document.getElementById('guest-container');

        // ★ 人数に合わせてカードのサイズを自動計算！（これで絶対にはみ出しません）
        let totalCards = casts.length + guests.length;
        let cardW = 210; // 基本サイズ
        if (totalCards > 12) cardW = 180; // 1列5枚
        if (totalCards > 18) cardW = 150; // 1列6枚
        if (totalCards > 24) cardW = 130; // 1列7枚
        if (totalCards > 32) cardW = 110; // 1列8枚
        document.documentElement.style.setProperty('--card-width', cardW + 'px');

        // ==== CASTの描画 ====
        casts.sort((a, b) => {
            if (a.status === '⭕' && b.status === '🔺') return -1;
            if (a.status === '🔺' && b.status === '⭕') return 1;
            return 0;
        });

        casts.forEach(cast => {
          let rolesHtml = cast.roles && cast.roles.length > 0 ? cast.roles.join(' / ') : '';
          let subBadge = cast.status === '🔺' ? '<div class="sub-badge">SUB</div>' : '';
          let imgUrl = cast.imageUrl || 'https://via.placeholder.com/240x400/11151a/d4af37?text=No+Image';

          let card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            ${subBadge}
            <img src="${imgUrl}" class="card-img" crossorigin="anonymous">
            <div class="card-info">
              <div class="roles">${rolesHtml}</div>
              <h3 class="name">${cast.name}</h3>
            </div>
          `;
          castContainer.appendChild(card);
        });

        // ==== GUESTの描画 ====
        if (guests.length > 0) {
            document.getElementById('guest-title').style.display = 'block';
            
            // M側 → C側の順に、さらに番号順で並び替え
            guests.sort((a, b) => {
                let isA_M = a.attribute.includes('M') ? 0 : 1;
                let isB_M = b.attribute.includes('M') ? 0 : 1;
                if(isA_M !== isB_M) return isA_M - isB_M;
                let numA = parseInt(a.number.replace(/[^0-9]/g, '')) || 999;
                let numB = parseInt(b.number.replace(/[^0-9]/g, '')) || 999;
                return numA - numB;
            });

            guests.forEach(guest => {
                let isM = guest.attribute.includes('M');
                let badgeClass = isM ? 'badge-m' : 'badge-c';
                let badgeText = isM ? 'M側' : 'C側';
                let guestBadge = `<div class="guest-badge ${badgeClass}">${badgeText}</div>`;
                let imgUrl = guest.imageUrl || 'https://via.placeholder.com/240x400/11151a/d4af37?text=No+Image';

                let card = document.createElement('div');
                card.className = 'card guest-card';
                card.innerHTML = `
                  ${guestBadge}
                  <img src="${imgUrl}" class="card-img" crossorigin="anonymous">
                  <div class="card-info">
                    <div class="roles">[${guest.number}]</div>
                    <h3 class="name">${guest.name}</h3>
                  </div>
                `;
                guestContainer.appendChild(card);
            });
        }

        // 描画完了！アニメーションを使わず即座に表示（Botが撮影しやすくするため）
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-content').style.opacity = '1';

      } catch (e) {
        document.getElementById('loading').innerText = "ERROR: " + e.message;
      }
    }

    generatePoster();
  </script>
</body>
</html>
