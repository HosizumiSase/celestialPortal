<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELESTIAL NIGHT - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #0f172a; }
        .portal-frame { width: 100%; height: 100%; border: none; background: transparent; display: none; }
        
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0f172a; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 0.8s ease; }
        #loader-text { color: #d4af37; font-family: 'Cinzel', serif; letter-spacing: 0.2em; margin-bottom: 20px; font-size: 1.2rem; }
        .discord-login-btn { background-color: #5865F2; color: #fff; text-decoration: none; padding: 15px 40px; border-radius: 4px; font-weight: bold; font-family: sans-serif; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4); transition: transform 0.2s, background-color 0.2s; }
        .discord-login-btn:hover { background-color: #4752C4; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="loader-overlay"><div id="loader-text">LOADING ADMIN PORTAL...</div></div>
    
    <!-- 認証後にGASの管理画面を映し出す魔法の鏡（iframe） -->
    <iframe id="portal-frame" class="portal-frame" allow="clipboard-read; clipboard-write"></iframe>

    <script>
        // ★ 星澄さんのGASのURL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxOnnUkklIpNwaRDDKpE8JKm_RowDc36P0RpD-z_9ZAnHbukcoeQ2pnRp8u9D1sVa8F/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        async function fetchAuthUrl() {
            try {
                // 管理者権限でのログインURLを要求する
                let response = await fetch(`${GAS_URL}?action=getAuthUrl&admin=true`);
                let data = await response.json();
                if (data && data.authUrl) {
                    document.getElementById('loader-text').innerHTML = `<a href="${data.authUrl}" class="discord-login-btn">LOGIN WITH DISCORD</a>`;
                } else {
                    document.getElementById('loader-text').innerText = "API ERROR";
                }
            } catch (e) {
                document.getElementById('loader-text').innerText = "CONNECTION ERROR";
            }
        }

        if (!token) {
            // トークンがなければログインボタンを出す
            document.getElementById('loader-text').innerText = "AUTHORIZING...";
            fetchAuthUrl();
        } else {
            // トークンがあれば、iframeの中にGASの管理画面を読み込む！
            document.getElementById('loader-text').innerText = "ENTER ADMIN PORTAL...";
            const iframe = document.getElementById('portal-frame');
            iframe.src = `${GAS_URL}?admin=true&token=${token}`;
            
            // GAS側の読み込みが終わったら、ローディング画面をフワッと消す
            iframe.onload = function() {
                const overlay = document.getElementById('loader-overlay');
                iframe.style.display = 'block';
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 800);
            };
        }
    </script>
</body>
</html>
